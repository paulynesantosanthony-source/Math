<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Interactive Lab - Custom Visualiser</title>
    <style>
        :root {
            --primary: #FF9F1C;
            --secondary: #2EC4B6;
            --bg-color: #FDFFFC;
            --text-dark: #011627;
            --danger: #E71D36;
            --purple: #9D4EDD;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--purple);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            justify-content: center;
            width: 100%;
        }

        /* --- Vertical Fractions --- */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            line-height: 1.2;
            margin: 0 6px;
            font-weight: bold;
        }
        
        .fraction .top {
            border-bottom: 2px solid currentColor;
            padding: 2px 5px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        
        .fraction .bottom {
            padding: 2px 5px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        /* Module Card */
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 3px solid var(--purple);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .card h2 {
            margin-top: 0;
            color: var(--purple);
            text-align: center;
        }

        .grid-100 {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            margin: 20px 0;
            width: 250px;
            height: 250px;
        }

        .grid-box {
            background-color: #eee;
            border-radius: 3px;
            border: 1px solid #ccc;
            transition: background-color 0.3s;
        }

        .grid-box.active-purple {
            background-color: var(--purple);
            border-color: #7238a6;
        }

        .equation-display {
            font-size: 1.8rem;
            font-weight: bold;
            background: #f4f4f4;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Custom Visualiser Inputs */
        .input-panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .input-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #dee2e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            font-weight: bold;
            color: var(--text-dark);
        }

        .input-group input {
            padding: 8px;
            font-size: 1.2rem;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 80px;
        }

        .fraction-input {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .fraction-input input {
            width: 60px;
        }

        .fraction-line {
            width: 70px;
            height: 2px;
            background-color: var(--text-dark);
        }

        button {
            background: var(--purple);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        button:hover { background: #7238a6; }
    </style>
</head>
<body>


    <div class="container">
        <!-- Module 3: All-in-One Custom Visualiser Only -->
        <div class="card">
            <h1>✨ Visualise the Conversion ✨</h1>
            <p>Type a number into <strong>ONE</strong> of the boxes below and click "Visualise" to see how they are all connected!</p>

            <div class="input-panel">
                <!-- Decimal Input -->
                <div class="input-group">
                    <label>Decimal</label>
                    <input type="number" id="custom-dec" placeholder="e.g. 0.3" step="0.01">
                    <button onclick="visualiseInput('decimal')">Visualise</button>
                </div>

                <!-- Percent Input -->
                <div class="input-group">
                    <label>Percent</label>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="number" id="custom-pct" placeholder="e.g. 30"> %
                    </div>
                    <button onclick="visualiseInput('percent')">Visualise</button>
                </div>

                <!-- Fraction Input -->
                <div class="input-group">
                    <label>Fraction</label>
                    <div class="fraction-input">
                        <input type="number" id="custom-num" placeholder="Num">
                        <div class="fraction-line"></div>
                        <input type="number" id="custom-den" placeholder="Den">
                    </div>
                    <button onclick="visualiseInput('fraction')">Visualise</button>
                </div>
            </div>

            <!-- Custom Visualization Grid & Output -->
            <div style="display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 40px; margin-top: 20px;">
                <div class="grid-100" id="grid-custom">
                    <!-- Javascript generates 100 boxes here -->
                </div>

                <div class="equation-display" id="custom-output" style="min-width: 300px; min-height: 80px;">
                    <em>Enter a number to see the magic!</em>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Setup Grid ---
        const gridCustom = document.getElementById('grid-custom');

        // Create 100 boxes for the custom visualizer grid
        for (let i = 0; i < 100; i++) {
            let box = document.createElement('div');
            box.classList.add('grid-box');
            gridCustom.appendChild(box);
        }

        const boxesCustom = gridCustom.querySelectorAll('.grid-box');
        const customOutput = document.getElementById('custom-output');

        // Helper function to find Greatest Common Divisor (for simplifying fractions)
        function getGCD(a, b) {
            return b === 0 ? a : getGCD(b, a % b);
        }

        function visualiseInput(inputType) {
            let decimalValue = 0;
            let isValid = false;

            // Determine the base decimal value depending on what the user inputted
            if (inputType === 'decimal') {
                const val = parseFloat(document.getElementById('custom-dec').value);
                if (!isNaN(val)) {
                    decimalValue = val;
                    isValid = true;
                }
            } else if (inputType === 'percent') {
                const val = parseFloat(document.getElementById('custom-pct').value);
                if (!isNaN(val)) {
                    decimalValue = val / 100;
                    isValid = true;
                }
            } else if (inputType === 'fraction') {
                const num = parseFloat(document.getElementById('custom-num').value);
                const den = parseFloat(document.getElementById('custom-den').value);
                if (!isNaN(num) && !isNaN(den) && den !== 0) {
                    decimalValue = num / den;
                    isValid = true;
                }
            }

            // Error check
            if (!isValid) {
                customOutput.innerHTML = `<span style="color: red; font-size: 1.2rem;">Please enter a valid number!</span>`;
                return;
            }

            // Calculations
            let percentValue = parseFloat((decimalValue * 100).toFixed(2));
            
            // To create a fraction, let's turn the exact percent into a fraction over 100 and simplify
            let numerator = Math.round(decimalValue * 100); 
            let denominator = 100;
            
            // Simplify the fraction
            let gcd = getGCD(Math.abs(numerator), denominator);
            let simplifiedNum = numerator / gcd;
            let simplifiedDen = denominator / gcd;

            // Update the Grid (cap visualization between 0 and 100)
            let visualSquares = Math.round(percentValue);
            boxesCustom.forEach((box, index) => {
                if (index < visualSquares && index < 100) {
                    box.classList.add('active-purple');
                } else {
                    box.classList.remove('active-purple');
                }
            });

            // Format Output Display
            customOutput.innerHTML = `
                <span>${decimalValue}</span> 
                <span>=</span> 
                <span>${percentValue}%</span> 
                <span>=</span> 
                <div class="fraction">
                    <span class="top">${simplifiedNum}</span>
                    <span class="bottom">${simplifiedDen}</span>
                </div>
            `;
            
            // Auto-fill the other input boxes so the user sees them update
            if (inputType !== 'decimal') document.getElementById('custom-dec').value = decimalValue;
            if (inputType !== 'percent') document.getElementById('custom-pct').value = percentValue;
            if (inputType !== 'fraction') {
                document.getElementById('custom-num').value = simplifiedNum;
                document.getElementById('custom-den').value = simplifiedDen;
            }
        }
    </script>
</body>
</html>
